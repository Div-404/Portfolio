<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar Scatter · Scroll Demo</title>

<!-- GSAP + ScrollTrigger -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #0a0a0f; color: #eee; font-family: system-ui, sans-serif; }

/* Tall scrollable area */
.scroll-space {
  height: 300vh;
  position: relative;
}

/* Pin container — keeps avatar centered during scroll */
.pin-wrap {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 800px;
}

/* Fragment canvas */
#canvas {
  position: relative;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(100, 180, 255, 0.15);
}

/* Each fragment tile */
.fragment {
  position: absolute;
  top: 0;
  left: 0;
  background-size: 300px 300px;
  background-repeat: no-repeat;
  background-position: 0 0;
  will-change: transform, opacity;
}

/* Section label */
.label {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.3;
  pointer-events: none;
}
.label span {
  display: inline-block;
  transition: opacity 0.3s;
}
</style>
</head>
<body>

<div class="scroll-space">
  <div class="pin-wrap">
    <div id="canvas"></div>
  </div>
</div>

<div class="label">
  <span id="labelText">SCROLL ↓</span>
</div>

<script>
// ─── IMAGE → FRAGMENTS ───────────────────────────────────────────
// Uses a generated gradient avatar so no external image is needed.
// Swap the background in createAvatarCanvas() for a real photo.

function createAvatarCanvas() {
  const c = document.createElement('canvas');
  c.width = 300;
  c.height = 300;
  const ctx = c.getContext('2d');

  // Radial gradient base — warm skin tone centre, dark edge
  const grad = ctx.createRadialGradient(150, 130, 20, 150, 150, 150);
  grad.addColorStop(0, '#f0d5b0');
  grad.addColorStop(0.35, '#d4a574');
  grad.addColorStop(0.6, '#8a6b4a');
  grad.addColorStop(0.85, '#2a2a3a');
  grad.addColorStop(1, '#0a0a0f');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(150, 150, 148, 0, Math.PI * 2);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.ellipse(150, 110, 90, 70, 0, Math.PI, 0);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#3a2a1a';
  ctx.beginPath();
  ctx.ellipse(115, 145, 12, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(185, 145, 12, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(112, 143, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(182, 143, 4, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#c4946a';
  ctx.beginPath();
  ctx.ellipse(150, 170, 8, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.strokeStyle = '#6a4a3a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(150, 195, 20, 0.1, Math.PI - 0.1);
  ctx.stroke();

  return c;
}

const avatarCanvas = createAvatarCanvas();
const avatarUrl = avatarCanvas.toDataURL();

// ─── GRID FRAGMENTATION ──────────────────────────────────────────
// The image is divided into GRID × GRID equal squares.
// Each <div> gets a background-position offset so all tiles together
// reconstruct the full image. Initial transform/opacity are identity.

const GRID = 12;              // 12×12 = 144 fragments
const SIZE = 300;             // avatar pixel size
const CELL = SIZE / GRID;

const container = document.getElementById('canvas');
const fragments = [];

for (let row = 0; row < GRID; row++) {
  for (let col = 0; col < GRID; col++) {
    const el = document.createElement('div');
    el.className = 'fragment';
    el.style.width = CELL + 'px';
    el.style.height = CELL + 'px';
    el.style.backgroundImage = `url(${avatarUrl})`;
    el.style.backgroundPosition = `-${col * CELL}px -${row * CELL}px`;
    el.style.backgroundSize = `${SIZE}px ${SIZE}px`;
    el.style.left = (col * CELL) + 'px';
    el.style.top = (row * CELL) + 'px';

    container.appendChild(el);

    // Randomisation per fragment (seeded by position for consistency)
    const seed = row * GRID + col;
    const angle = (seed * 137.5) % 360;               // golden-angle distribution
    const rad = angle * Math.PI / 180;
    const dist = 120 + (seed % 50) * 3;               // 120–270 px
    const rot = (seed * 47) % 360 - 180;              // -180°–180°

    fragments.push({
      el,
      tx: Math.cos(rad) * dist,
      ty: Math.sin(rad) * dist,
      rot,
    });
  }
}

// ─── GSAP SCROLLTRIGGER ──────────────────────────────────────────
// A single timeline from 0→1 is scrubbed by scroll.
// progress = 0   → fully assembled (identity)
// progress = 0.3 → micro-cracks appear
// progress = 0.6 → fragments separate (mid-point)
// progress = 1   → fully scattered, faded out
// Because scrub:true links progress to scrollbar position,
// scrolling up naturally reverses every tween → fragments reassemble.

gsap.registerPlugin(ScrollTrigger);

const tl = gsap.timeline({
  scrollTrigger: {
    trigger: '.scroll-space',
    start: 'top top',
    end: 'bottom bottom',
    scrub: 1.2,               // smooth bidirectional scrub
    invalidateOnRefresh: true,
  },
  defaults: { ease: 'power2.inOut' },
});

// Phase 1 — micro-fracture (progress 0→0.3)
tl.to(fragments.map(f => f.el), {
  x: (i) => fragments[i].tx * 0.05,
  y: (i) => fragments[i].ty * 0.05,
  rotation: (i) => fragments[i].rot * 0.05,
  opacity: 0.92,
  duration: 0.3,
  stagger: { each: 0.002, from: 'center' },
}, 0);

// Phase 2 — main scatter (progress 0.3→0.7)
tl.to(fragments.map(f => f.el), {
  x: (i) => fragments[i].tx * 0.65,
  y: (i) => fragments[i].ty * 0.65,
  rotation: (i) => fragments[i].rot * 0.65,
  opacity: 0.5,
  duration: 0.4,
  stagger: { each: 0.003, from: 'center' },
}, 0.3);

// Phase 3 — full dispersion (progress 0.7→1)
tl.to(fragments.map(f => f.el), {
  x: (i) => fragments[i].tx,
  y: (i) => fragments[i].ty,
  rotation: (i) => fragments[i].rot,
  opacity: 0,
  duration: 0.3,
  stagger: { each: 0.002, from: 'random' },
}, 0.7);

// ─── LABEL ───────────────────────────────────────────────────────
const label = document.getElementById('labelText');
ScrollTrigger.create({
  trigger: '.scroll-space',
  start: 'top top',
  end: 'bottom bottom',
  scrub: true,
  onUpdate: (self) => {
    const p = self.progress;
    if (p < 0.05) label.textContent = 'SCROLL ↓';
    else if (p < 0.4) label.textContent = '⟡ CRACKING';
    else if (p < 0.7) label.textContent = '⟡ SCATTERING';
    else if (p < 0.95) label.textContent = '⟡ DISPERSING';
    else label.textContent = 'SCROLL ↑ · REASSEMBLE';
  },
});

console.log(`✨ ${fragments.length} fragments ready — scroll down to break, up to rebuild`);
</script>
</body>
</html>
